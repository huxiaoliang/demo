---
# TLS Secret for ai4ops.cc
# Note: This secret needs to be created manually using acme.sh
# Run the following commands to create/restore the secret:
# 
#   1. Export Cloudflare token:
#      export CF_Token="your_cloudflare_token_here"
#
#   2. Get certificate (first time):
#      /root/.acme.sh/acme.sh --issue --dns dns_cf \
#        -d ai4ops.cc \
#        --email your-email@example.com
#
#   3. Create secret:
#      kubectl create secret tls ai4ops-tls \
#        --cert=/root/.acme.sh/ai4ops.cc_ecc/fullchain.cer \
#        --key=/root/.acme.sh/ai4ops.cc_ecc/ai4ops.cc.key \
#        -n higress-system
#
#   4. The crontab will handle renewal automatically:
#      6 22 * * * "/root/.acme.sh"/acme.sh --cron --home "/root/.acme.sh" > /dev/null
apiVersion: v1
kind: Secret
metadata:
  name: ai4ops-tls
  namespace: higress-system
type: kubernetes.io/tls
data:
  # Certificate and key placeholders (base64 encoded)
  # These will be populated by acme.sh after certificate issuance
  tls.crt: ""
  tls.key: ""
